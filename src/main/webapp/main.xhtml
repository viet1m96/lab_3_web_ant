

<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui"
      xmlns:pt="http://xmlns.jcp.org/jsf/passthrough">

<h:head>
    <title>Лаб 3 по Вебу</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
    <h:outputStylesheet name="styles/common.css"/>
    <h:outputStylesheet name="styles/header.css"/>
    <h:outputStylesheet name="styles/clock.css"/>
    <h:outputStylesheet name="styles/main.css"/>
</h:head>

<h:body>
    <header>
        <div>
            <div class="hover-card">
                <div class="card-container">
                    <i id="author-symbol" class="fa-solid fa-user-circle"> </i>
                    <span id="author-name"> HOANG THE VIET </span>
                    <div class="card-data">
                            <span class="card-description">
                                <strong>Hoang The Viet</strong> from <strong>P3232</strong> with variant <strong>415129</strong>
                            </span>
                    </div>
                </div>
            </div>

        </div>
        <div id="result-overlay" aria-live="polite">
            <span id="result-overlay-text"> </span>
        </div>
        <div>
            <div class="date-wrapper">
                    <span id="dow11"> </span>
                    <span id="day11"> </span>
                    <span id="mon11"> </span>
                    <span id="year11"> </span>
                </div>
            <div class="clock-wrapper">
                    <div class="countdown">
                        <div class="time-section" id="hours">
                            <div class="time-group">
                                <div class="time-segment">
                                    <div class="segment-display">
                                        <div class="segment-display__top"> </div>
                                        <div class="segment-display__bottom"> </div>
                                        <div class="segment-overlay">
                                            <div class="segment-overlay__top"> </div>
                                            <div class="segment-overlay__bottom"> </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="time-segment">
                                    <div class="segment-display">
                                        <div class="segment-display__top"> </div>
                                        <div class="segment-display__bottom"> </div>
                                        <div class="segment-overlay">
                                            <div class="segment-overlay__top"> </div>
                                            <div class="segment-overlay__bottom"> </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <p>Hours</p>
                        </div>

                        <div class="time-section" id="minutes">
                            <div class="time-group">
                                <div class="time-segment">
                                    <div class="segment-display">
                                        <div class="segment-display__top"> </div>
                                        <div class="segment-display__bottom"> </div>
                                        <div class="segment-overlay">
                                            <div class="segment-overlay__top"> </div>
                                            <div class="segment-overlay__bottom"> </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="time-segment">
                                    <div class="segment-display">
                                        <div class="segment-display__top"> </div>
                                        <div class="segment-display__bottom"> </div>
                                        <div class="segment-overlay">
                                            <div class="segment-overlay__top"> </div>
                                            <div class="segment-overlay__bottom"> </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <p>Minutes</p>
                        </div>

                        <div class="time-section" id="seconds">
                            <div class="time-group">
                                <div class="time-segment">
                                    <div class="segment-display">
                                        <div class="segment-display__top"> </div>
                                        <div class="segment-display__bottom"> </div>
                                        <div class="segment-overlay">
                                            <div class="segment-overlay__top"> </div>
                                            <div class="segment-overlay__bottom"> </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="time-segment">
                                    <div class="segment-display">
                                        <div class="segment-display__top"> </div>
                                        <div class="segment-display__bottom"> </div>
                                        <div class="segment-overlay">
                                            <div class="segment-overlay__top"> </div>
                                            <div class="segment-overlay__bottom"> </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <p>Seconds</p>
                        </div>
                    </div>
                </div>
        </div>
    </header>

    <div class="working-container">
        <div class="left-panel">
            <div class="top-panel">
                <div class="label-area">
                    Enter the parameters:
                </div>
                <h:form id="form">
                    <div class="input-zone">
                        <label class="labels"> Coordinate X: </label>
                        <p:selectOneRadio id="x" value="#{paramsBean.x}" layout="responsive" styleClass="radio-x-group" required="true" requiredMessage="Please pick one of these values!" >
                            <f:selectItem itemLabel="-3" itemValue="-3"/>
                            <f:selectItem itemLabel="-2" itemValue="-2"/>
                            <f:selectItem itemLabel="-1" itemValue="-1"/>
                            <f:selectItem itemLabel="0"  itemValue="0"/>
                            <f:selectItem itemLabel="1" itemValue="1"/>
                            <f:selectItem itemLabel="2" itemValue="2"/>
                            <f:selectItem itemLabel="3" itemValue="3"/>
                        </p:selectOneRadio>
                        <p:message for="x"/>
                    </div>
                    <div class="input-zone">
                        <label class="labels"> Coordinate Y: </label>
                        <div class="input-and-condition">
                            <p:inputText id="y"
                                         value="#{paramsBean.y}"
                                         styleClass="inputTextY"
                                         required="true"
                                         requiredMessage="Please pick one of these values!"
                                         pt:data-js-hook="num-only">
                                <f:validateDoubleRange minimum="-5" maximum="3"/>
                            </p:inputText>
                            <p class="condition"> Y must be in range: [-5, 3] </p>
                            <div id="yFeedback" class="input-feedback"> </div>
                            <p:message for="y"/>
                        </div>
                    </div>
                    <div class="input-zone">
                        <label class="labels"> Parameter R: </label>
                        <p:selectOneRadio id="R"
                                          value="#{paramsBean.r}"
                                          layout="responsive"
                                          styleClass="radio-r-group"
                                          required="true"
                                          requiredMessage="Please pick one of these values!"
                                          pt:data-cid="#{component.clientId}"
                                          >
                            <f:selectItem itemLabel="1" itemValue="1"/>
                            <f:selectItem itemLabel="1.5" itemValue="1.5"/>
                            <f:selectItem itemLabel="2" itemValue="2"/>
                            <f:selectItem itemLabel="2.5"  itemValue="2.5"/>
                            <f:selectItem itemLabel="3" itemValue="3"/>
                            <p:ajax event="change" process="@this" update=":graphForm:gr"/>
                        </p:selectOneRadio>
                        <p:message for="R"/>
                    </div>

                    <div class="button-container">
                        <p:commandButton id="submit"
                                         value="Submit"
                                         ajax="true"
                                         widgetVar="submitter"
                                         action="#{listBean.submit}"
                                         update="form msgs final-results"
                                         process="@form"
                                         oncomplete="loadPointsFromJson(args.pointsJson);
                                                     showResultOverlay(args.hit);"/>
                    </div>
                </h:form>
            </div>

            <div class="bottom-panel">
                <div class="label-area">
                    Results
                </div>

                 <p:dataTable id="final-results"
                              value="#{listBean.model}"
                              var="p"
                              lazy="true"
                              paginator="true"
                              rows="5">
                     <p:column headerText="Hit">#{p.hit}</p:column>
                     <p:column headerText="x">#{p.x}</p:column>
                     <p:column headerText="y">#{p.y}</p:column>
                     <p:column headerText="R">#{p.r}</p:column>
                     <p:column headerText="Calculation Time">#{p.calTime}</p:column>
                     <p:column headerText="Released">
                         <h:outputText value="#{p.releaseTime}">
                             <f:convertDateTime type="localDateTime" pattern="yyyy-MM-dd HH:mm:ss"/>
                         </h:outputText>
                     </p:column>
                 </p:dataTable>


            </div>
        </div>

        <div class="right-panel">
            <div class="label-area">
                Illustration Graph
            </div>
            <canvas id="graph">

                <h:form id="graphForm" style="display:none">
                    <h:inputHidden id="gx" value="#{paramsBean.x}" />
                    <h:inputHidden id="gy" value="#{paramsBean.y}" />
                    <h:inputHidden id="gr" value="#{paramsBean.r}" />
                    <p:commandButton id="graphSubmit"
                                     ajax="true"
                                     action="#{listBean.submit}"
                                     update="form msgs final-results"
                                     process="@form"
                                     oncomplete="loadPointsFromJson(args.pointsJson);
                                                     showResultOverlay(args.hit);"/>
                </h:form>
            </canvas>
            <div class="big-log">
                <div class="coordinate-log">
                    <label>Current X: </label>
                    <p id="screen-log-x"> </p>
                </div>
                <div class="coordinate-log">
                    <label>Current Y: </label>
                    <p id="screen-log-y"> </p>
                </div>
            </div>
        </div>

    </div>

    <div id="back-to-home-wrapper">
        <h:link outcome="index" target="self" styleClass="link" value="← Back to home"/>
    </div>
    <script>
        window.submitGraphPoint = function(x, y) {
            var gx = document.getElementById('graphForm:gx');
            var gy = document.getElementById('graphForm:gy');
            var btn = document.getElementById('graphForm:graphSubmit');

            gx.value = x;
            gy.value = y;

            btn.click();
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"/>
    <h:outputScript name="scripts/FlipClock.js"/>
    <h:outputScript name="scripts/FlipDate.js"/>
    <h:outputScript name="scripts/DrawingPoints.js"/>
    <h:outputScript name="scripts/DrawingGraph.js"/>
    <h:outputScript name="scripts/Validation.js"/>
    <h:outputScript name="scripts/Main.js"/>
</h:body>

</html>
