<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:pt="http://xmlns.jcp.org/jsf/passthrough">
<h:head>
    <title>Лаб 3 по Вебу</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
    <h:outputStylesheet name="styles/common.css"/>
    <h:outputStylesheet name="styles/header.css"/>
    <h:outputStylesheet name="styles/clock.css"/>
    <h:outputStylesheet name="styles/main.css"/>
</h:head>

<h:body>
    <header>
        <div>
            <div class="hover-card">
                <div class="card-container">
                    <i id="author-symbol" class="fa-solid fa-user-circle"> </i>
                    <span id="author-name"> HOANG THE VIET </span>
                    <div class="card-data">
                            <span class="card-description">
                                <strong>Hoang The Viet</strong> from <strong>P3232</strong> with variant <strong>415129</strong>
                            </span>
                    </div>
                </div>
            </div>

        </div>
        <div id="result-overlay" aria-live="polite">
            <span id="result-overlay-text"> </span>
        </div>
        <div>
            <div class="date-wrapper">
                    <span id="dow11"> </span>
                    <span id="day11"> </span>
                    <span id="mon11"> </span>
                    <span id="year11"> </span>
                </div>
            <div class="clock-wrapper">
                    <div class="countdown">
                        <div class="time-section" id="hours">
                            <div class="time-group">
                                <div class="time-segment">
                                    <div class="segment-display">
                                        <div class="segment-display__top"> </div>
                                        <div class="segment-display__bottom"> </div>
                                        <div class="segment-overlay">
                                            <div class="segment-overlay__top"> </div>
                                            <div class="segment-overlay__bottom"> </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="time-segment">
                                    <div class="segment-display">
                                        <div class="segment-display__top"> </div>
                                        <div class="segment-display__bottom"> </div>
                                        <div class="segment-overlay">
                                            <div class="segment-overlay__top"> </div>
                                            <div class="segment-overlay__bottom"> </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <p>Hours</p>
                        </div>

                        <div class="time-section" id="minutes">
                            <div class="time-group">
                                <div class="time-segment">
                                    <div class="segment-display">
                                        <div class="segment-display__top"> </div>
                                        <div class="segment-display__bottom"> </div>
                                        <div class="segment-overlay">
                                            <div class="segment-overlay__top"> </div>
                                            <div class="segment-overlay__bottom"> </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="time-segment">
                                    <div class="segment-display">
                                        <div class="segment-display__top"> </div>
                                        <div class="segment-display__bottom"> </div>
                                        <div class="segment-overlay">
                                            <div class="segment-overlay__top"> </div>
                                            <div class="segment-overlay__bottom"> </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <p>Minutes</p>
                        </div>

                        <div class="time-section" id="seconds">
                            <div class="time-group">
                                <div class="time-segment">
                                    <div class="segment-display">
                                        <div class="segment-display__top"> </div>
                                        <div class="segment-display__bottom"> </div>
                                        <div class="segment-overlay">
                                            <div class="segment-overlay__top"> </div>
                                            <div class="segment-overlay__bottom"> </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="time-segment">
                                    <div class="segment-display">
                                        <div class="segment-display__top"> </div>
                                        <div class="segment-display__bottom"> </div>
                                        <div class="segment-overlay">
                                            <div class="segment-overlay__top"> </div>
                                            <div class="segment-overlay__bottom"> </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <p>Seconds</p>
                        </div>
                    </div>
                </div>
        </div>
    </header>

    <div class="working-container">
        <div class="left-panel">
            <div class="top-panel">
                <div class="label-area">
                    Enter the parameters:
                </div>

            </div>

            <div class="bottom-panel">
                <div class="label-area">
                    Results
                </div>

                <table id="final-results" class="inner-table">
                    <tr>
                        <th> Hit </th>
                        <th> X </th>
                        <th> Y </th>
                        <th> R </th>
                        <th> Calculation time </th>
                        <th> Release time </th>
                    </tr>
                </table>

            </div>
        </div>

        <div class="right-panel">
            <div class="label-area">
                Illustration Graph
            </div>
            <canvas id="graph"> </canvas>
            <div class="big-log">
                <div class="coordinate-log">
                    <label>Current X: </label>
                    <p id="screen-log-x"> </p>
                </div>
                <div class="coordinate-log">
                    <label>Current Y: </label>
                    <p id="screen-log-y"> </p>
                </div>
            </div>
        </div>

    </div>

    <div id="back-to-home-wrapper">
        <h:link outcome="index" target="self" styleClass="link" value="← Back to home"/>
    </div>
</h:body>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"/>
<h:outputScript name="scripts/FlipClock.js"/>
<h:outputScript name="scripts/FlipDate.js"/>
<h:outputScript name="scripts/DrawingPoints.js"/>
<h:outputScript name="scripts/DrawingGraph.js"/>
</html>
