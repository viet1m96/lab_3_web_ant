<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:pt="http://xmlns.jcp.org/jsf/passthrough">
<h:head>
    <title>Лаб 3 по Вебу</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
    <h:outputStylesheet name="styles/common.css"/>
    <h:outputStylesheet name="styles/header.css"/>
    <h:outputStylesheet name="styles/index.css"/>
    <h:outputStylesheet name="styles/clock.css"/>
</h:head>

<h:body>
    <header>
        <div>
            <div class="hover-card">
                <div class="card-container">
                    <i id="author-symbol" class="fa-solid fa-user-circle"> </i>
                    <span id="author-name"> HOANG THE VIET </span>
                    <div class="card-data">
                            <span class="card-description">
                                <strong>Hoang The Viet</strong> from <strong>P3232</strong> with variant <strong>415129</strong>
                            </span>
                    </div>
                </div>
            </div>

        </div>
        <div>
            <div class="date-wrapper">
                    <span id="dow11"> </span>
                    <span id="day11"> </span>
                    <span id="mon11"> </span>
                    <span id="year11"> </span>
                </div>
            <div class="clock-wrapper">
                    <div class="countdown">
                        <div class="time-section" id="hours">
                            <div class="time-group">
                                <div class="time-segment">
                                    <div class="segment-display">
                                        <div class="segment-display__top"> </div>
                                        <div class="segment-display__bottom"> </div>
                                        <div class="segment-overlay">
                                            <div class="segment-overlay__top"> </div>
                                            <div class="segment-overlay__bottom"> </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="time-segment">
                                    <div class="segment-display">
                                        <div class="segment-display__top"> </div>
                                        <div class="segment-display__bottom"> </div>
                                        <div class="segment-overlay">
                                            <div class="segment-overlay__top"> </div>
                                            <div class="segment-overlay__bottom"> </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <p>Hours</p>
                        </div>

                        <div class="time-section" id="minutes">
                            <div class="time-group">
                                <div class="time-segment">
                                    <div class="segment-display">
                                        <div class="segment-display__top"> </div>
                                        <div class="segment-display__bottom"> </div>
                                        <div class="segment-overlay">
                                            <div class="segment-overlay__top"> </div>
                                            <div class="segment-overlay__bottom"> </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="time-segment">
                                    <div class="segment-display">
                                        <div class="segment-display__top"> </div>
                                        <div class="segment-display__bottom"> </div>
                                        <div class="segment-overlay">
                                            <div class="segment-overlay__top"> </div>
                                            <div class="segment-overlay__bottom"> </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <p>Minutes</p>
                        </div>

                        <div class="time-section" id="seconds">
                            <div class="time-group">
                                <div class="time-segment">
                                    <div class="segment-display">
                                        <div class="segment-display__top"> </div>
                                        <div class="segment-display__bottom"> </div>
                                        <div class="segment-overlay">
                                            <div class="segment-overlay__top"> </div>
                                            <div class="segment-overlay__bottom"> </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="time-segment">
                                    <div class="segment-display">
                                        <div class="segment-display__top"> </div>
                                        <div class="segment-display__bottom"> </div>
                                        <div class="segment-overlay">
                                            <div class="segment-overlay__top"> </div>
                                            <div class="segment-overlay__bottom"> </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <p>Seconds</p>
                        </div>
                    </div>
                </div>
        </div>

    </header>

    <div class="presentation-container">

        <div class="info-wrapper">
            <div class="home-img">
                <img src="https://media1.tenor.com/m/dza0F8SCVvUAAAAC/johncena-john.gif" loading="lazy" alt=""/>
            </div>
            <div class="home-content">
                <h1>Hi, It's <span>Viet</span></h1>
                <h3 class="typing-text">I'm a <span>Student from ITMO.</span></h3>
                <p>This is the starting site for my third lab in my web course at university.</p>
                <div class="social-icons">
                    <h:outputLink value="https://www.linkedin.com/in/vietht-hl/"
                                  pt:data-tip="LinkedIn" pt:target="_blank" pt:rel="noopener"
                                  pt:aria-label="LinkedIn">
                        <i class="fa-brands fa-linkedin"> </i>
                        <span class="sr-only">LinkedIn</span>
                    </h:outputLink>
                    <h:outputLink value="https://github.com/viet1m96"
                                  pt:data-tip="GitHub" pt:target="_blank" pt:rel="noopener"
                                  pt:aria-label="GitHub">
                        <i class="fa-brands fa-github"> </i>
                        <span class="sr-only">GitHub</span>
                    </h:outputLink>
                    <h:outputLink value="https://www.facebook.com/viet.thehoang.9"
                                  pt:data-tip="Facebook" pt:target="_blank" pt:rel="noopener"
                                  pt:aria-label="Facebook">
                        <i class="fa-brands fa-facebook"> </i>
                        <span class="sr-only">Facebook</span>
                    </h:outputLink>

                </div>
                <div class="transfer-link">
                    <h:link outcome="main" target="self" styleClass="link" value="Go to Lab 3 ➜"/>
                </div>
            </div>
        </div>
    </div>
</h:body>
<h:outputScript name="scripts/FlipClock.js"/>
<h:outputScript name="scripts/FlipDate.js"/>
</html>
